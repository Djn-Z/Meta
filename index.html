<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #000000, #1a0000);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: rgba(0,0,0,0.85);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 0 25px red;
        text-align: center;
        width: 320px;
        transition: 0.5s;
    }

    .success {
        box-shadow: 0 0 25px lime;
    }

    .logo svg {
        width: 70px;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 10px red);
        transition: 0.5s;
    }

    .logo.success svg {
        filter: drop-shadow(0 0 10px lime);
    }

    h1 {
        color: red;
        margin-bottom: 30px;
        letter-spacing: 2px;
        transition: 0.5s;
    }

    h1.success {
        color: lime;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        background: #111;
        color: white;
    }

    button {
        width: 100%;
        padding: 10px;
        background: red;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: darkred;
        box-shadow: 0 0 10px red;
    }

    .message {
        margin-top: 15px;
        font-weight: bold;
        transition: 0.5s;
    }

    .error {
        color: #ff4d4d;
    }

    .success-text {
        color: lime;
    }
</style>
</head>

<body>

<div class="container" id="box">

    <div class="logo" id="logo">
        <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="40" stroke="red" stroke-width="4"/>
            <path d="M30 50 L50 30 L70 50 L50 70 Z" stroke="red" stroke-width="3" fill="none"/>
            <circle cx="50" cy="50" r="5" fill="red"/>
        </svg>
    </div>

    <h1 id="title">WormGPT

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="message" id="msg"></div>

</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const box = document.getElementById("box");
    const logo = document.getElementById("logo");
    const title = document.getElementById("title");
    const msg = document.getElementById("msg");

    if (email === "amani50@gmail.com" && password === "1234") {

        // تغيير الستايل إلى نجاح
        box.classList.add("success");
        logo.classList.add("success");
        title.classList.add("success");

        msg.className = "message success-text";
        msg.innerText = "✔ Login Successful";

        // تحويل بعد ثانيتين
        setTimeout(() => {
            window.location.href = "home.html";
        }, 2000);

    } else {
        msg.className = "message error";
        msg.innerText = "✖ Incorrect email or password";
    }
}
</script>

</body>
</html>
